<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRYF8 | Official Site</title>
    <style>
        /* Base Styling - Dark Theme */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container Layout */
        .container {
            width: 90%;
            max-width: 800px; /* Perfect desktop width */
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* Responsive Video Box */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background: #1a1a1a;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Responsive adjustments for phone view */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            p {
                font-size: 0.9rem;
                margin-bottom: 25px;
            }
            .container {
                width: 95%;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DRYF8</h1>
        <p>Music & Beats coming soon.</p>

        <!-- Video Player Frame -->
        <div class="video-wrapper">
            <!-- Temporary YouTube link (Rick Astley) - Replace later with your own music video or player! -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
