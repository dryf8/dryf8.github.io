<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRYF8 | Official Site</title>
    <style>
        /* Premium Bio-Link Dark Theme */
        body {
            background-color: #0a0a0c;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            /* Ambient background glow */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(165, 180, 252, 0.05) 0%, transparent 60%);
        }

        /* Compact Central Profile Card */
        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px; /* Slimmer layout like guns.lol */
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            box-sizing: border-box;
        }

        /* Circular Profile Picture Placeholder */
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            margin: 0 auto 20px auto;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        /* Creative Text Animation for Title */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 8px 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Pointing to the custom breathing glow animation below */
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        /* The Animation Code */
        @keyframes textGlow {
            0% {
                filter: drop-shadow(0 0 2px rgba(165, 180, 252, 0.2));
                transform: scale(1);
            }
            100% {
                filter: drop-shadow(0 0 15px rgba(165, 180, 252, 0.6));
                transform: scale(1.02); /* Subtle pulse */
            }
        }

        .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
        }

        /* Stacked Vertical Links */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        /* Smooth interactive hover styling */
        .btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Central Bio Link Card -->
    <div class="profile-card">
        
        <!-- Avatar Placeholder (Displays initials 'D8' for now) -->
        <div class="avatar">D8</div>

        <!-- Animated Title & Subtitle -->
        <h1>DRYF8</h1>
        <div class="subtitle">Producer & Artist</div>

        <!-- Navigation Stack -->
        <div class="links-stack">
            <a href="#" class="btn" target="_blank">YOUTUBE</a>
            <a href="#" class="btn" target="_blank">BEATSTARS</a>
            <a href="#" class="btn" target="_blank">INSTAGRAM</a>
        </div>
        
    </div>

</body>
</html>
